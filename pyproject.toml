[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Hace importable el paquete `app` al ejecutar el script `pytest` directamente
# (el CI no usa `python -m pytest`, que añadiría el cwd a sys.path).
pythonpath = ["."]
